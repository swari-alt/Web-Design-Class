<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Morning Storybook</title>
<link href="https://fonts.googleapis.com/css2?family=Patrick+Hand&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  background: #F4C2C2;
}

.scene {
  height: 100vh;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  scroll-snap-align: start;
}

html {
  scroll-behavior: smooth;
  scroll-snap-type: y mandatory;
}

.scene img.main {
  width: 500px;
  max-width: 80%;
  border: 3px dashed black;
  background: white;
  padding: 10px;
  transform: rotate(-1deg);
}

.products {
  margin-top: 15px;
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
  justify-content: center;
}

.products img {
  width: 100px;
  background: white;
  padding: 5px;
  transform: rotate(2deg);
  box-shadow: 2px 2px 0 black;
}

.label {
  margin-top: 10px;
  font-size: 14px;
  font-style: italic;
}
</style>
</head>

<body>
<!-- images -->

<h1 class="title">My Morning Routine</h1>

<div class="scene">
  <img class="main" src="images /room-text.JPG">
  <div class="label">wake up + meditate</div>

  <div class="products">
    <img src="products/yoga.png">
  </div>
</div>


<div class="scene">
  <img class="main" src="images /bathroom scene.JPG">
  <div class="label">brush teeth + wash face</div>

  <div class="products">
    <img src="products/floss.png">
    <img src="products/toothpaste.png">
    <img src="products/toothbrush.png">
    <img src="products/tongue.png">
    <img src="products/facewash.png">
  </div>
</div>

<div class="scene">
  <img class="main" src="images /closet-scene.JPG">
  <div class="label">makeup time</div>

  <div class="products">
    <img src="products/toner.png">
    <img src="products/moisterizer.png">
    <img src="products/blush.png">
    <img src="products/brush.png">
    <img src="products/concealer.png">
    <img src="products/sponge.png">
    <img src="products/coconut-mist.png">
    <img src="products/powder.png">
    <img src="products/powderpuff.png">
    <img src="products/eyelash-curler.png">
    <img src="products/mascara.png">
  </div>
</div>

<div class="scene">
  <img class="main" src="images /kitchen-text.JPG">
  <div class="label">breakfast</div>
</div>

</body>
</html>
