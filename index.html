<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jane Dough</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="container">
    
    <h1>Jane Dough</h1>
    
    <p id="message">Click the dough!</p>
    
    <img src="dough.png"
    id="dough"
    onclick="document.getElementById('message').innerHTML='Hi! My name is Jane Dough. Change my size to help me grow!'"
    >
    
    </div>
    
</body>
</html>
